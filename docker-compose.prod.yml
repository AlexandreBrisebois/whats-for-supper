# What's For Supper — Production Docker Compose
# Usage: docker-compose -f docker-compose.prod.yml up -d
# Services: postgres → api → pwa

services:
  postgres:
    image: postgres:18-alpine3.23
    restart: unless-stopped
    environment:
      POSTGRES_USER: recipe_app
      POSTGRES_PASSWORD: <your-strong-password>
      POSTGRES_DB: recipe_app_db
    ports:
      # Only expose if you need remote DB access; otherwise, remove this line
      - "5432:5432"
    volumes:
      - /volume1/docker/whats-for-supper/postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U recipe_app -d recipe_app_db"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s
    networks:
      - app-network

  api:
    image: 192.168.1.226:5050/whats-for-supper-api:latest
    restart: unless-stopped
    ports:
      - "5000:5000"
    environment:
      POSTGRES_CONNECTION_STRING: postgres://recipe_app:<your-strong-password>@postgres:5432/recipe_app_db
      ASPNETCORE_ENVIRONMENT: Production
      ASPNETCORE_URLS: http://+:5000
      CORS_ALLOWED_ORIGINS: https://yourdomain.com
      RECIPES_ROOT: /data/recipes
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - /volume1/docker/whats-for-supper/recipes_data:/data/recipes
    networks:
      - app-network

  pwa:
    image: 192.168.1.226:5050/whats-for-supper-pwa:latest
    restart: unless-stopped
    ports:
      - "80:3000"
    environment:
      API_INTERNAL_URL: http://api:5000
      NEXT_PUBLIC_API_BASE_URL: /backend
    depends_on:
      - api
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/api/health"]
      interval: 10s
      timeout: 5s
      retries: 6
      start_period: 30s
    networks:
      - app-network

networks:
  app-network:
    driver: bridge
