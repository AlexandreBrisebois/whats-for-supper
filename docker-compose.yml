# What's For Supper — Phase 0 Docker Compose
# Usage: docker-compose up
# Services: postgres → api → pwa

services:

  # ──────────────────────────────────────────────────────────────────────────
  # PostgreSQL 18
  # ──────────────────────────────────────────────────────────────────────────
  postgres:
    image: postgres:18-alpine3.23
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-recipe_app}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-secure_dev_password}
      POSTGRES_DB: ${POSTGRES_DB:-recipe_app_db}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-recipe_app} -d ${POSTGRES_DB:-recipe_app_db}"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s
    networks:
      - app-network

  # ──────────────────────────────────────────────────────────────────────────
  # .NET 10 Recipe API
  #
  # Note: the runtime image is Ubuntu Chiseled (no shell, no curl/wget).
  # Health checks must use the orchestrator's native HTTP probe (Kubernetes)
  # or be omitted in docker-compose so that services downstream can use
  # condition: service_started. The API self-migrates the database on boot.
  # ──────────────────────────────────────────────────────────────────────────
  api:
    image: 192.168.1.226:5050/whats-for-supper-api:latest
    restart: unless-stopped
    ports:
      - "5000:5000"
    environment:
      POSTGRES_CONNECTION_STRING: postgres://recipe_app:<your-strong-password>@postgres:5432/recipe_app_db
      ASPNETCORE_ENVIRONMENT: Production
      ASPNETCORE_URLS: http://+:5000
      CORS_ALLOWED_ORIGINS: https://yourdomain.com
      RECIPES_ROOT: /data/recipes
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - /volume1/docker/whats-for-supper/recipes_data:/data/recipes
    networks:
      - app-network

  # ──────────────────────────────────────────────────────────────────────────
  # Next.js 16 PWA
  # ──────────────────────────────────────────────────────────────────────────
  pwa:
    image: 192.168.1.226:5050/whats-for-supper-pwa:latest
    restart: unless-stopped
    ports:
      - "80:3000"
    environment:
      API_INTERNAL_URL: http://api:5000
      NEXT_PUBLIC_API_BASE_URL: /backend
    depends_on:
      - api
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/api/health"]
      interval: 10s
      timeout: 5s
      retries: 6
      start_period: 30s
    networks:
      - app-network

# ────────────────────────────────────────────────────────────────────────────
# Networks
# ────────────────────────────────────────────────────────────────────────────
networks:
  app-network:
    driver: bridge

# ────────────────────────────────────────────────────────────────────────────
# Volumes
# ────────────────────────────────────────────────────────────────────────────
volumes:
  postgres_data:
    name: whats-for-supper-postgres
  recipes_data:
    name: whats-for-supper-recipes
