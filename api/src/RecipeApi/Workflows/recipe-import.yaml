name: recipe-import
parameters:
    - recipeId
tasks:
    - name: extract_recipe
      processor: ExtractRecipe
      payload:
          recipeId: "{{ recipeId }}"
    - name: generate_hero
      processor: GenerateHero
      depends_on:
          - extract_recipe
      payload:
          recipeId: "{{ recipeId }}"
    - name: sync_recipe
      processor: SyncRecipe
      depends_on:
          - generate_hero
      payload:
          recipeId: "{{ recipeId }}"
    - name: recipe_ready
      processor: RecipeReady
      depends_on:
          - sync_recipe
      payload:
          recipeId: "{{ recipeId }}"
