name: goto-synthesis
parameters:
    - recipeId
    - description
tasks:
    - name: synthesize_recipe
      processor: SynthesizeRecipe
      payload:
          recipeId: "{{ recipeId }}"
          description: "{{ description }}"
    - name: generate_hero
      processor: GenerateHero
      depends_on:
          - synthesize_recipe
      payload:
          recipeId: "{{ recipeId }}"
    - name: sync_recipe
      processor: SyncRecipe
      depends_on:
          - generate_hero
      payload:
          recipeId: "{{ recipeId }}"
    - name: mark_goto_ready
      processor: MarkGotoReady
      depends_on:
          - sync_recipe
      payload:
          recipeId: "{{ recipeId }}"
