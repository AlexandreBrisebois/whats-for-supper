name: Publish Release Images

on:
  push:
    tags:
      - 'v*'

jobs:
  publish:
    name: Build & Push Images
    # Only run if pushed by AlexandreBrisebois in the main repository
    if: >
      github.repository == 'AlexandreBrisebois/whats-for-supper' &&
      github.actor == 'AlexandreBrisebois'
    runs-on: [self-hosted, linux]

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # Required to verify branch ancestry

      - name: Verify main branch ancestry
        run: |
          echo "Verifying if tag ${{ github.ref_name }} is on main branch..."
          if git merge-base --is-ancestor ${{ github.sha }} origin/main; then
            echo "✓ Commit is an ancestor of main."
          else
            echo "✗ Error: Tag must be pushed from a commit that exists on the main branch."
            exit 1
          fi

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Install Task
        run: |
          sh -c "$(curl --location https://taskfile.dev/install.sh)" -- -d -b ./bin
          echo "$GITHUB_WORKSPACE/bin" >> $GITHUB_PATH

      - name: Publish Images
        run: task publish TAG=${{ github.ref_name }}
        env:
          TAG: ${{ github.ref_name }}
