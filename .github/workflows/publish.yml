name: Publish Release Images

on:
  push:
    tags:
      - 'v*'

jobs:
  determine-runner:
    name: Determine Best Runner
    runs-on: ubuntu-latest
    outputs:
      labels: ${{ steps.select.outputs.labels }}
      platforms: ${{ steps.select.outputs.platforms }}

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Determine Runner and Platforms
        id: select
        run: |
          # 1. Ensure we have the actual annotated tag metadata
          git fetch --tags --force
          
          # 2. Check Tag Message for hints ([fast], [slow], [multi])
          TAG_MSG=$(git tag -l --format='%(subject)' "${{ github.ref_name }}")
          echo "DEBUG: Raw Tag Subject: '$TAG_MSG'"
          
          # 3. Determine Runner Label
          if echo "$TAG_MSG" | grep -Fq "[fast]"; then
            echo "🚀 Direct hint: fast runner"
            echo "labels=[\"self-hosted\", \"linux\", \"fast\"]" >> $GITHUB_OUTPUT
          elif echo "$TAG_MSG" | grep -Fq "[slow]"; then
            echo "🐢 Direct hint: slow runner"
            echo "labels=[\"self-hosted\", \"linux\", \"slow\"]" >> $GITHUB_OUTPUT
          else
            echo "ℹ️ No runner hint: using first available"
            echo "labels=[\"self-hosted\", \"linux\"]" >> $GITHUB_OUTPUT
          fi

          # 4. Determine Platforms
          if echo "$TAG_MSG" | grep -Fq "[multi]"; then
            echo "🌎 Multi-arch requested: linux/amd64,linux/arm64"
            echo "platforms=linux/amd64,linux/arm64" >> $GITHUB_OUTPUT
          else
            echo "⚡ Single-arch default: linux/amd64"
            echo "platforms=linux/amd64" >> $GITHUB_OUTPUT
          fi

  publish:
    name: Build & Push Images
    needs: determine-runner
    # Only run if pushed by AlexandreBrisebois in the main repository
    if: >
      github.repository == 'AlexandreBrisebois/whats-for-supper' &&
      github.actor == 'AlexandreBrisebois'
    runs-on: ${{ fromJSON(needs.determine-runner.outputs.labels) }}
    env:
      DOCKER_API_VERSION: "1.43" # Required for Synology NAS (Slow Runner) compatibility

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # Required to verify branch ancestry

      - name: Verify main branch ancestry
        run: |
          echo "Verifying if tag ${{ github.ref_name }} is on main branch..."
          if git merge-base --is-ancestor ${{ github.sha }} origin/main; then
            echo "✓ Commit is an ancestor of main."
          else
            echo "✗ Error: Tag must be pushed from a commit that exists on the main branch."
            exit 1
          fi

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
        with:
          driver-opts: network=host
          buildkitd-config-inline: |
            [registry."192.168.1.226:5050"]
              http = true

      - name: Install Task
        run: |
          sh -c "$(curl --location https://taskfile.dev/install.sh)" -- -d -b ./bin
          echo "$GITHUB_WORKSPACE/bin" >> $GITHUB_PATH

      - name: Publish Images
        run: task publish TAG=${{ github.ref_name }} PLATFORMS=${{ needs.determine-runner.outputs.platforms }}
        env:
          TAG: ${{ github.ref_name }}
          GITHUB_ACTIONS: "true"
