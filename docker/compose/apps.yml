services:
  # ──────────────────────────────────────────────────────────────────────────
  # .NET 10 Recipe API
  # ──────────────────────────────────────────────────────────────────────────
  api:
    container_name: whats-for-supper-api
    build:
      context: ../../api
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      POSTGRES_CONNECTION_STRING: ${POSTGRES_CONNECTION_STRING:-postgres://recipe_app:secure_dev_password@postgres:5432/recipe_app_db}
      ASPNETCORE_ENVIRONMENT: ${ASPNETCORE_ENVIRONMENT:-Development}
      ASPNETCORE_URLS: http://+:9001
      CORS__ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:-http://pwa.wfs.localhost,http://localhost:3000}
      RECIPES_ROOT: /data/recipes
      GEMINI_API_KEY: ${GEMINI_API_KEY:-}
      AgentSettings__Endpoint: ${OLLAMA_API_ENDPOINT:-http://host.docker.internal:11434/v1}
      AgentSettings__ModelId: ${OLLAMA_MODEL_ID:-gemma4:e4b}
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ${RECIPES_VOLUME_SOURCE:-recipes_data}:/data/recipes
    networks:
      - proxy
      - internal
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=wfs-proxy"
      - "traefik.http.routers.api-container.rule=Host(`${API_HOST:-api.wfs.localhost}`)"
      - "traefik.http.routers.api-container.entrypoints=web"
      - "traefik.http.services.api-container.loadbalancer.server.port=9001"

  # ──────────────────────────────────────────────────────────────────────────
  # Next.js 15 PWA
  # ──────────────────────────────────────────────────────────────────────────
  pwa:
    container_name: whats-for-supper-pwa
    build:
      context: ../../pwa
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      NEXT_PUBLIC_API_BASE_URL: ${NEXT_PUBLIC_API_BASE_URL:-http://api.wfs.localhost}
      API_INTERNAL_URL: ${API_INTERNAL_URL:-http://api:9001}
    depends_on:
      - api
    networks:
      - proxy
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=wfs-proxy"
      - "traefik.http.routers.pwa-container.rule=Host(`${PWA_HOST:-pwa.wfs.localhost}`)"
      - "traefik.http.routers.pwa-container.entrypoints=web"
      - "traefik.http.services.pwa-container.loadbalancer.server.port=3000"

networks:
  proxy:
    name: wfs-proxy
  internal:
    name: wfs-internal

volumes:
  recipes_data:
