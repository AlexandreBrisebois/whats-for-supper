services:
  # ──────────────────────────────────────────────────────────────────────────
  # .NET 10 Recipe API
  # ──────────────────────────────────────────────────────────────────────────
  api:
    container_name: whats-for-supper-api
    build:
      context: ../../api
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:

      POSTGRES_CONNECTION_STRING: ${POSTGRES_CONNECTION_STRING:-postgres://recipe_app:secure_dev_password@postgres:5432/recipe_app_db}
      ASPNETCORE_ENVIRONMENT: ${ASPNETCORE_ENVIRONMENT:-Development}
      ASPNETCORE_URLS: http://+:9001
      CORS__ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:-http://pwa.wfs.localhost,http://localhost:3000}
      DATA_ROOT: /data
      GEMINI_API_KEY: ${GEMINI_API_KEY}
      GEMINI_MODEL_ID: ${GEMINI_MODEL_ID}

    depends_on:
      postgres:
        condition: service_healthy
        required: true
      migration:
        condition: service_completed_successfully
        required: true

    networks:
      - proxy
      - internal
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=wfs-proxy"
      - "traefik.http.routers.api.rule=Host(`${API_HOST:-api.wfs.localhost}`)"
      - "traefik.http.routers.api.entrypoints=web"
      - "traefik.http.services.api.loadbalancer.server.port=9001"
 

  # ──────────────────────────────────────────────────────────────────────────
  # Next.js 15 PWA
  # ──────────────────────────────────────────────────────────────────────────
  pwa:
    container_name: whats-for-supper-pwa
    build:
      context: ../../pwa
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:


      NEXT_PUBLIC_API_BASE_URL: ${NEXT_PUBLIC_API_BASE_URL:-/backend}
      API_INTERNAL_URL: ${API_INTERNAL_URL:-http://api:9001}
      HEARTH_SECRET: ${HEARTH_SECRET}
    depends_on:
      - api
    networks:
      - proxy
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=wfs-proxy"
      - "traefik.http.routers.pwa.rule=Host(`${PWA_HOST:-pwa.wfs.localhost}`)"
      - "traefik.http.routers.pwa.entrypoints=web"
      - "traefik.http.services.pwa.loadbalancer.server.port=3000"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/api/health"]
      interval: 10s
      timeout: 5s
      retries: 6
      start_period: 30s

networks:
  proxy:
    name: wfs-proxy
  internal:
    name: wfs-internal

volumes:

