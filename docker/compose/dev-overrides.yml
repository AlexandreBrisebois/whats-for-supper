services:
  api:
    volumes:
      - ${DATA_ROOT:-../../data}:/data
    # In dev, we can optionally expose the API port directly
    # ports:
    #   - "9001:9001"

  postgres:
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  traefik:
    ports:
      - "${TRAEFIK_HTTP_PORT:-80}:80"
      - "${TRAEFIK_ADMIN_PORT:-8080}:8080"
