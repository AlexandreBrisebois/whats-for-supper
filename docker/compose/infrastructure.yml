services:
  traefik:
    container_name: whats-for-supper-traefik
    image: traefik:v3.1
    restart: unless-stopped
    command:
      - "--api.insecure=true"
      - "--providers.docker=true"
      - "--providers.docker.endpoint=${DOCKER_ENDPOINT:-unix:///var/run/docker.sock}"
      - "--providers.docker.exposedbydefault=false"
      - "--providers.file.filename=/etc/traefik/dynamic.yml"
      - "--entrypoints.web.address=:80"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - ./traefik_dynamic.yml:/etc/traefik/dynamic.yml:ro
    networks:
      - proxy
      - internal

  # ──────────────────────────────────────────────────────────────────────────
  # PostgreSQL 18
  # ──────────────────────────────────────────────────────────────────────────
  postgres:
    container_name: whats-for-supper-postgres
    image: pgvector/pgvector:pg18
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-recipe_app}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-secure_dev_password}
      POSTGRES_DB: ${POSTGRES_DB:-recipe_app_db}
    volumes:
      - postgres_data:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER:-recipe_app} -d $${POSTGRES_DB:-recipe_app_db}"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s
    networks:
      - internal

  # ──────────────────────────────────────────────────────────────────────────
  # PostgreSQL 18 - DB Migrations
  # ──────────────────────────────────────────────────────────────────────────
  migration:
    image: whats-for-supper-db-migration
    build:
      context: ../../api/database
      dockerfile: Dockerfile
    restart: "no"
    environment:
      PGPASSWORD: ${POSTGRES_PASSWORD}
    command: >
      -h postgres
      -U ${POSTGRES_USER:-recipe_app}
      ${POSTGRES_DB:-recipe_app_db}
      -f /schema.sql
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - internal

networks:
  proxy:
    name: wfs-proxy
    driver: bridge
  internal:
    name: wfs-internal
    driver: bridge

volumes:
  postgres_data:
