services:
  # ──────────────────────────────────────────────────────────────────────────
  # API Production Overrides
  # ──────────────────────────────────────────────────────────────────────────
  api:
    image: ${WFS_REGISTRY:-whats-for-supper}/whats-for-supper-api:${TAG:-latest}
    build: null # Disable local build in production
    environment:
      ASPNETCORE_ENVIRONMENT: Production
      POSTGRES_CONNECTION_STRING: ${POSTGRES_CONNECTION_STRING}
      GEMINI_API_KEY: ${GEMINI_API_KEY}
    volumes:
      - ./recipes:/data/recipes
    # We remove the local ports if Traefik is handling 80
    ports: !reset []

  # ──────────────────────────────────────────────────────────────────────────
  # PWA Production Overrides
  # ──────────────────────────────────────────────────────────────────────────
  pwa:
    image: ${WFS_REGISTRY:-whats-for-supper}/whats-for-supper-pwa:${TAG:-latest}
    build: null # Disable local build in production
    environment:
      NEXT_PUBLIC_API_BASE_URL: ${NEXT_PUBLIC_API_BASE_URL}
      API_INTERNAL_URL: http://api:9001
    # We remove the local ports if Traefik is handling 80
    ports: !reset []

  # ──────────────────────────────────────────────────────────────────────────
  # PostgreSQL Production Overrides
  # ──────────────────────────────────────────────────────────────────────────
  postgres:
    environment:
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - ./postgres-data:/var/lib/postgresql/data
    ports: !reset []

  # ──────────────────────────────────────────────────────────────────────────
  # Traefik Production Overrides
  # ──────────────────────────────────────────────────────────────────────────
  traefik:
    ports:
      - "${TRAEFIK_HTTP_PORT:-80}:80"
      - "${TRAEFIK_ADMIN_PORT:-8080}:8080"
