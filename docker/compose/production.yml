services:
  # ──────────────────────────────────────────────────────────────────────────
  # API Production Overrides
  # ──────────────────────────────────────────────────────────────────────────
  api:
    image: ${WFS_REGISTRY:-whats-for-supper}/whats-for-supper-api:${TAG:-latest}
    build: null # Disable local build in production
    environment:
      ASPNETCORE_ENVIRONMENT: Production
      POSTGRES_CONNECTION_STRING: ${POSTGRES_CONNECTION_STRING}
      GEMINI_API_KEY: ${GEMINI_API_KEY}
      GEMINI_PROJECT_ID: ${GEMINI_PROJECT_ID}
    ports:
      - "${API_PORT_EXTERNAL:-9101}:9001"
    volumes:
      - ./recipes:/data/recipes

  # ──────────────────────────────────────────────────────────────────────────
  # PWA Production Overrides
  # ──────────────────────────────────────────────────────────────────────────
  pwa:
    image: ${WFS_REGISTRY:-whats-for-supper}/whats-for-supper-pwa:${TAG:-latest}
    build: null # Disable local build in production
    environment:
      NEXT_PUBLIC_API_BASE_URL: ${NEXT_PUBLIC_API_BASE_URL}
      API_INTERNAL_URL: http://api:9001
    ports:
      - "${PWA_PORT_EXTERNAL:-9102}:3000"

  # ──────────────────────────────────────────────────────────────────────────
  # PostgreSQL Production Overrides
  # ──────────────────────────────────────────────────────────────────────────
  postgres:
    environment:
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - ./postgres-data:/var/lib/postgresql/data
    ports:
      - "${POSTGRES_PORT_EXTERNAL:-9103}:5432"

  # ──────────────────────────────────────────────────────────────────────────
  # Traefik Production Overrides
  # ──────────────────────────────────────────────────────────────────────────
  traefik:
    ports:
      - "${TRAEFIK_HTTP_PORT:-9100}:80"
      - "${TRAEFIK_ADMIN_PORT:-9180}:8080"
