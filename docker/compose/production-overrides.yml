services:
  api:
    image: ${WFS_REGISTRY}/whats-for-supper-api:${TAG}
    environment:
      ASPNETCORE_ENVIRONMENT: Production
    ports:
      - "9101:9001"

  pwa:
    image: ${WFS_REGISTRY}/whats-for-supper-pwa:${TAG}
    ports:
      - "9102:3000"

  # ──────────────────────────────────────────────────────────────────────────
  # Cloudflare Tunnel
  # ──────────────────────────────────────────────────────────────────────────
  cloudflared:
    container_name: whats-for-supper-cloudflared
    image: cloudflare/cloudflared:latest
    restart: unless-stopped
    environment:
      TUNNEL_TOKEN: ${CLOUDFLARE_TUNNEL_TOKEN}
    command: tunnel --no-autoupdate run
    networks:
      - proxy
