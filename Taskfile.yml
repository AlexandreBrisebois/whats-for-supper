version: '3'

# What's For Supper - Development Tasks
# Install: https://taskfile.dev/installation/
# Usage: task [task-name] or task -l (list all)

set: [pipefail]
shopt: [globstar]

vars:
  API_PORT: '5000'
  PWA_PORT: '3000'
  DB_PORT: '5432'
  REGISTRY: '192.168.1.226:5050'
  PLATFORMS: 'linux/amd64,linux/arm64'
  TAG: 'v0.1' # Default — override with environment or CLI
  COMPOSE_CMD: 'docker compose -p whats-for-supper -f docker/compose/infrastructure.yml -f docker/compose/apps.yml'

tasks:
  default:
    desc: "Show available tasks"
    cmds:
      - task -l

  # ============================================================================
  # CORE DEVELOPMENT
  # ============================================================================

  up:
    desc: "🚀 Start all services (Traefik-based orchestration)"
    cmds:
      - '{{.COMPOSE_CMD}} up -d'
      - task: health
      - |
        echo ""
        echo "✓ Ecosystem started:"
        echo "  - PWA:       http://pwa.wfs.localhost"
        echo "  - API:       http://api.wfs.localhost"
        echo "  - Dashboard: http://localhost:8080"
        echo ""
        echo "Stop all: task down"

  dev:
    desc: "🚀 Start all services (Traefik-based orchestration)"
    cmds:
      - '{{.COMPOSE_CMD}} up -d'
      - task: health
      - |
        echo "NOTE: Use 'task up' for the new Traefik-based modular environment."

  dev:api:
    desc: "API development (hot reload)"
    dir: api
    cmds:
      - dotnet watch run --project src/RecipeApi/RecipeApi.csproj

  dev:pwa:
    desc: "PWA development (hot reload)"
    dir: pwa
    cmds:
      - npm run dev

  dev:db:
    desc: "Start only database (for local API/PWA dev)"
    cmds:
      - '{{.COMPOSE_CMD}} up -d postgres'
      - echo "✓ Database started on localhost:{{.DB_PORT}}"
      - echo ""
      - echo "Set these env vars:"
      - echo "  POSTGRES_CONNECTION_STRING=postgres://postgres:password@localhost:{{.DB_PORT}}/recipes"
      - echo "  RECIPES_ROOT=/tmp/recipes"

  # ============================================================================
  # TESTING
  # ============================================================================

  test:
    desc: "🧪 Run all tests (API + PWA)"
    cmds:
      - task: test:api
      - task: test:pwa
      - echo ""
      - echo "✓ All tests passed!"

  test:api:
    desc: "Test API (unit + integration)"
    dir: api
    cmds:
      - dotnet test

  test:api:watch:
    desc: "Test API in watch mode"
    dir: api
    cmds:
      - dotnet watch test

  test:pwa:
    desc: "Test PWA"
    dir: pwa
    cmds:
      - npm run test

  test:pwa:watch:
    desc: "Test PWA in watch mode"
    dir: pwa
    cmds:
      - npm run test -- --watch

  test:e2e:
    desc: "Run E2E tests (Phase 2+)"
    dir: tools/tests/e2e-testing
    cmds:
      - npm test
    status:
      - test -f package.json

  # ============================================================================
  # BUILDING
  # ============================================================================

  build:
    desc: "📦 Build all Docker images (Local arch)"
    cmds:
      - task: build:api
      - task: build:pwa
      - echo "✓ All local images built"

  publish:
    desc: "🚀 Build and Push multi-arch images (NASA-ready)"
    vars:
      TAG: '{{default .TAG .CLI_ARGS}}'
    cmds:
      - echo "Publishing version {{.TAG}} to {{.REGISTRY}}..."
      - 'docker buildx build --platform {{.PLATFORMS}} -t {{.REGISTRY}}/whats-for-supper-api:{{.TAG}} ./api --push --target production'
      - 'docker buildx build --platform {{.PLATFORMS}} -t {{.REGISTRY}}/whats-for-supper-pwa:{{.TAG}} ./pwa --push --target production'
      - echo "✓ Version {{.TAG}} pushed to {{.REGISTRY}}"

  infra:prod:
    desc: "📄 Generate flat production manifest for NAS"
    cmds:
      - '{{.COMPOSE_CMD}} config > docker-compose.prod.yml'
      - 'echo "✓ Production manifest generated in docker-compose.prod.yml"'
      - 'echo "  Copy this file to your Synology DS723+ Container Manager."'

  build:api:
    desc: "Build API Docker image"
    cmds:
      - 'docker build -t whats-for-supper/api:latest ./api'
      - 'echo "✓ API image built: whats-for-supper/api:latest"'

  build:pwa:
    desc: "Build PWA Docker image"
    cmds:
      - 'docker build -t whats-for-supper/pwa:latest ./pwa'
      - 'echo "✓ PWA image built: whats-for-supper/pwa:latest"'

  # ============================================================================
  # CONTAINER MANAGEMENT
  # ============================================================================

  down:
    desc: "⛔ Stop all modular services"
    cmds:
      - '{{.COMPOSE_CMD}} down'
      - echo "✓ Modular services stopped"

  stop:
    desc: "⛔ Stop all services"
    cmds:
      - '{{.COMPOSE_CMD}} stop'
      - echo "✓ Legacy containers stopped"

  ps:
    desc: "Show running containers"
    cmds:
      - '{{.COMPOSE_CMD}} ps'

  restart:
    desc: "Restart all containers"
    cmds:
      - task: down
      - task: up

  # ============================================================================
  # LOGGING & DEBUGGING
  # ============================================================================

  logs:
    desc: "📋 View logs from all services"
    cmds:
      - '{{.COMPOSE_CMD}} logs -f'

  logs:api:
    desc: "View API logs"
    cmds:
      - '{{.COMPOSE_CMD}} logs -f api'

  logs:pwa:
    desc: "View PWA logs"
    cmds:
      - '{{.COMPOSE_CMD}} logs -f pwa'

  logs:db:
    desc: "View database logs"
    cmds:
      - '{{.COMPOSE_CMD}} logs -f postgres'

  logs:tail:
    desc: "Tail logs from all services (last 50 lines)"
    cmds:
      - '{{.COMPOSE_CMD}} logs --tail=50'

  # ============================================================================
  # DATABASE
  # ============================================================================

  migrate:
    desc: "🗄️  Run database migrations"
    cmds:
      - 'docker exec whats-for-supper-api dotnet ef database update'
      - echo "✓ Migrations applied"

  seed:
    desc: "Populate database with test data"
    cmds:
      - 'docker exec whats-for-supper-api bash -c "cd src/RecipeApi && dotnet user-secrets set SeedDatabase true"'
      - 'docker restart whats-for-supper-api'
      - sleep 2
      - echo "✓ Test data seeded"

  db:backup:
    desc: "Backup database"
    cmds:
      - 'docker exec whats-for-supper-postgres pg_dump -U postgres recipes > backup_$(date +%s).sql'
      - echo "✓ Database backed up"

  db:restore:
    desc: "Restore database from backup"
    cmds:
      - |
        read -p "Enter backup file path: " backup_file
        docker exec -i whats-for-supper-postgres psql -U postgres recipes < "$backup_file"
        echo "✓ Database restored"

  # ============================================================================
  # CONTAINER SHELLS
  # ============================================================================

  shell:api:
    desc: "Open bash shell in API container"
    cmds:
      - 'docker exec -it whats-for-supper-api bash'

  shell:pwa:
    desc: "Open shell in PWA container"
    cmds:
      - 'docker exec -it whats-for-supper-pwa sh'

  shell:db:
    desc: "Open psql shell in database"
    cmds:
      - 'docker exec -it whats-for-supper-postgres psql -U postgres -d recipes'

  # ============================================================================
  # CODE QUALITY
  # ============================================================================

  format:
    desc: "✨ Format code (API + PWA)"
    cmds:
      - task: format:api
      - task: format:pwa
      - echo "✓ Code formatted"

  format:api:
    desc: "Format C# code"
    dir: api
    cmds:
      - dotnet format

  format:pwa:
    desc: "Format JavaScript/TypeScript code"
    dir: pwa
    cmds:
      - npx prettier --write "src/**/*.{ts,tsx,json,css}"

  lint:
    desc: "🔍 Lint code (API + PWA)"
    cmds:
      - task: lint:api
      - task: lint:pwa
      - echo "✓ No lint errors"

  lint:api:
    desc: "Lint C# code"
    dir: api
    cmds:
      - dotnet format --verify-no-changes --verbosity diagnostic

  lint:pwa:
    desc: "Lint JavaScript/TypeScript code"
    dir: pwa
    cmds:
      - npm run lint

  typecheck:
    desc: "Type check TypeScript code"
    dir: pwa
    cmds:
      - npm run typecheck

  # ============================================================================
  # HEALTH & DIAGNOSTICS
  # ============================================================================

  health:
    desc: "🏥 Check service health"
    cmds:
      - |
        echo "Checking services..."
        echo ""
        echo "API (Traefik Route):"
        curl -s -H "Host: api.wfs.localhost" http://localhost/health 2>/dev/null | jq . 2>/dev/null && echo "  ✓ API running" || echo "  ✗ API not responding"
        echo ""
        echo "PWA (Traefik Route):"
        curl -s -H "Host: pwa.wfs.localhost" http://localhost/api/health 2>/dev/null | jq . 2>/dev/null && echo "  ✓ PWA running" || echo "  ✗ PWA not responding"
        echo ""
        echo "Database:"
        docker exec whats-for-supper-postgres pg_isready -U postgres 2>/dev/null && echo "  ✓ Database running" || echo "  ✗ Database not responding"

  env:
    desc: "Show environment configuration"
    cmds:
      - |
        echo "Environment Variables:"
        echo ""
        grep -E "^(POSTGRES|API|REDIS|OLLAMA)" .env.local 2>/dev/null || echo "  No service env vars in .env.local"
        echo ""
        echo "Service Ports:"
        echo "  API: {{.API_PORT}}"
        echo "  PWA: {{.PWA_PORT}}"
        echo "  DB:  {{.DB_PORT}}"

  # ============================================================================
  # CLEANUP
  # ============================================================================

  clean:
    desc: "🧹 Clean up everything (containers, volumes, caches)"
    cmds:
      - '{{.COMPOSE_CMD}} down -v'
      - rm -rf api/bin api/obj
      - rm -rf pwa/node_modules pwa/.next
      - rm -rf tools/tests/node_modules
      - echo "✓ Cleaned up"
    interactive: true

  clean:soft:
    desc: "Stop containers (keep volumes for quick restart)"
    cmds:
      - '{{.COMPOSE_CMD}} down'
      - echo "✓ Containers stopped (data preserved)"

  # ============================================================================
  # SETUP & INITIALIZATION
  # ============================================================================

  init:
    desc: "Initialize project (first-time setup)"
    cmds:
      - |
        echo "Setting up What's For Supper..."
        echo ""
      - task: init:env
      - task: init:dependencies
      - task: dev
      - task: migrate
      - task: seed
      - |
        echo ""
        echo "✓ Project initialized!"
        echo ""
        echo "Next steps:"
        echo "  1. Open http://localhost:{{.PWA_PORT}} in your browser"
        echo "  2. Run: task logs (to watch all services)"
        echo "  3. Edit code and see changes instantly"
        echo "  4. Run: task test (before committing)"

  init:env:
    desc: "Create .env.local from template"
    cmds:
      - |
        if [ ! -f .env.local ]; then
          cp .env.example .env.local
          echo "✓ Created .env.local"
        else
          echo "✓ .env.local already exists"
        fi
    status:
      - test -f .env.local

  init:dependencies:
    desc: "Install all dependencies"
    cmds:
      - |
        echo "Installing API dependencies..."
        cd api && dotnet restore
        echo "✓ API dependencies installed"
        echo ""
        echo "Installing PWA dependencies..."
        cd ../pwa && npm install
        echo "✓ PWA dependencies installed"

  # ============================================================================
  # GIT HOOKS (optional)
  # ============================================================================

  hooks:install:
    desc: "Install git pre-commit hook"
    cmds:
      - cp tools/hooks/pre-commit .git/hooks/pre-commit
      - chmod +x .git/hooks/pre-commit
      - echo "✓ Pre-commit hook installed"
    status:
      - test -f tools/hooks/pre-commit

  # ============================================================================
  # DOCUMENTATION
  # ============================================================================

  docs:dev-loop:
    desc: "Open local development loop documentation"
    cmds:
      - |
        if command -v open &> /dev/null; then
          open LOCAL_DEV_LOOP.md
        elif command -v xdg-open &> /dev/null; then
          xdg-open LOCAL_DEV_LOOP.md
        else
          cat LOCAL_DEV_LOOP.md
        fi

  docs:spec:
    desc: "Open Phase 0 specification"
    cmds:
      - |
        if command -v open &> /dev/null; then
          open src/specs/phase0-mvp.spec.md
        elif command -v xdg-open &> /dev/null; then
          xdg-open src/specs/phase0-mvp.spec.md
        else
          cat src/specs/phase0-mvp.spec.md
        fi

  # ============================================================================
  # SHORTCUTS FOR COMMON WORKFLOWS
  # ============================================================================

  work:
    desc: "Developer workflow: dev + api logs + pwa logs"
    cmds:
      - |
        echo "Starting development workflow..."
        echo ""
        echo "Running: task up"
        task up
        echo ""
        echo "Services starting. Open new terminal windows for:"
        echo "  Terminal 1: task logs:api"
        echo "  Terminal 2: task logs:pwa"
        echo "  Terminal 3: task dev:api (or cd api && dotnet watch run)"
        echo ""
        echo "Then open http://localhost:{{.PWA_PORT}} in your browser"

  review:
    desc: "Pre-commit review: format + lint + test"
    cmds:
      - task: format
      - task: lint
      - task: test
      - echo ""
      - echo "✓ Ready to commit!"

  ship:
    desc: "Ship checklist: review + clean build + test"
    cmds:
      - task: review
      - task: build
      - task: dev
      - task: health
      - echo ""
      - echo "✓ Everything looks good! Ready to push."

  # ============================================================================
  # AGENT TOOLS (AI OPTIMIZED)
  # ============================================================================

  agent:summary:
    desc: "🤖 Context-dense project summary for AI agents"
    cmds:
      - |
        echo "=== PROJECT SUMMARY ==="
        echo "Tech Stack: .NET 10, Next.js, Postgres (pgvector)"
        echo ""
        echo "Directory Tree (Depth 2):"
        find . -maxdepth 2 -not -path '*/.*'
        echo ""
        echo "Service Health:"
        task health
        echo ""
        echo "Active Session:"
        cat HANDOVER.md 2>/dev/null || echo "No active handover log found."

  agent:api:
    desc: "🤖 Map all API endpoints (Low token discovery)"
    cmds:
      - python3 scripts/agent/map_api.py

  agent:status:
    desc: "🤖 Read the handover journal"
    cmds:
      - cat HANDOVER.md

  agent:list:
    desc: "🤖 List all agent-specific tasks"
    cmds:
      - task -l | grep "agent:"
    silent: true
