version: '3'

# What's For Supper - Development Tasks
# Install: https://taskfile.dev/installation/
# Usage: task [task-name] or task -l (list all)

set: [pipefail]
shopt: [globstar]

vars:
  API_PORT: '5050'
  PWA_PORT: '3000'
  DB_PORT: '5432'
  DB_NAME: 'recipe_app_db'
  # Registry for image distribution
  WFS_REGISTRY: '{{.WFS_REGISTRY | default "192.168.1.226:5050"}}'
  # Default platform (GitHub Actions: amd64, Local: arm64)
  PLATFORMS: '{{if .PLATFORMS}}{{.PLATFORMS}}{{else if .GITHUB_ACTIONS}}linux/amd64{{else}}linux/arm64{{end}}'
  TAG: 'v0.1'
  # Database Target (localhost or NAS IP)
  TARGET_DB_HOST: '{{.TARGET_DB_HOST | default "localhost"}}'
  # CLI helper for docker compose
  COMPOSE_CMD: 'docker compose -p whats-for-supper --env-file docker/.env $([ -f docker/.env.local ] && echo "--env-file docker/.env.local") -f docker/compose/infrastructure.yml -f docker/compose/apps.yml -f docker/compose/dev-overrides.yml'

tasks:
  default:
    desc: "Show available tasks"
    cmds:
      - task -lF

  # ============================================================================
  # CORE DEVELOPMENT
  # ============================================================================

  up:
    desc: "🚀 Start all services (Traefik-based orchestration)"
    cmds:
      - '{{.COMPOSE_CMD}} up -d'
      - task: health
      - |
        echo ""
        echo "✓ Ecosystem started:"
        echo "  - PWA:       http://pwa.wfs.localhost"
        echo "  - API:       http://api.wfs.localhost"
        echo "  - Dashboard: http://localhost:8080"
        echo ""
        echo "Stop all: task down"


  dev:api:
    desc: "API development (hot reload)"
    dir: api
    env:
      ASPNETCORE_ENVIRONMENT: Development
      RECIPES_ROOT: "/Users/alex/Code/whats-for-supper/data/recipes"
      ASPNETCORE_URLS: http://localhost:9001
      POSTGRES_CONNECTION_STRING: "Host=localhost;Port=5432;Database=recipe_app_db;Username=recipe_app;Password=secure_dev_password"
    cmds:
      - dotnet watch run --project RecipeApi.csproj

  dev:pwa:
    desc: "PWA development (hot reload)"
    dir: pwa
    cmds:
      - npm run dev

  dev:db:
    desc: "Start only database (for local API/PWA dev)"
    cmds:
      - '{{.COMPOSE_CMD}} up -d postgres'
      - echo "✓ Database started on localhost:{{.DB_PORT}}"

  dev:db:sync:
    desc: "🔄 Full Docker DB refresh: up + migrate + seed (Forces Rebuild)"
    cmds:
      - task: dev:db
      - task: migrate
      - '{{.COMPOSE_CMD}} up -d --build traefik api'
      - task: seed
      - echo "✓ Docker database is synced, seeded, and running fresh code"

  dev:clean:sync:
    desc: "🛑 Nuclear Option: Wipe all volumes/images and run a clean dev:db:sync"
    cmds:
      - '{{.COMPOSE_CMD}} down -v --rmi local'
      - task: dev:db:sync

  dev:kill:
    desc: "Kill lingering dev:api and dev:pwa instances (ports + background dotnet)"
    cmds:
      - |
        echo "Searching for lingering processes..."

        # Kill processes blocking ports 9001 and {{.PWA_PORT}}
        PORT_PIDS=$(lsof -ti:9001,{{.PWA_PORT}} 2>/dev/null || true)
        if [ -n "$PORT_PIDS" ]; then
          echo "Killing processes on ports: $PORT_PIDS"
          echo "$PORT_PIDS" | xargs kill -9
        fi

        # Kill any lingering dotnet processes related to the API (watch or direct run)
        # Using pkill -f to match the command line arguments
        echo "Cleaning up lingering dotnet processes..."
        pkill -9 -f "dotnet.*RecipeApi" || true
        pkill -9 -f "dotnet-watch" || true

        echo "✓ Lingering processes cleaned up"

  # ============================================================================
  # TESTING
  # ============================================================================

  test:
    desc: "🧪 Run all tests (API + PWA)"
    cmds:
      - task: test:api
      - task: test:pwa
      - echo ""
      - echo "✓ All tests passed!"

  test:api:
    desc: "Test API (unit + integration)"
    dir: api
    cmds:
      - dotnet test src/RecipeApi.Tests/RecipeApi.Tests.csproj

  test:api:watch:
    desc: "Test API in watch mode"
    dir: api
    cmds:
      - dotnet watch test

  test:pwa:
    desc: "Test PWA"
    dir: pwa
    cmds:
      - npm run test

  test:pwa:watch:
    desc: "Test PWA in watch mode"
    dir: pwa
    cmds:
      - npm run test -- --watch

  test:pwa:ci:
    desc: "Test PWA against production build (CI Parity)"
    dir: pwa
    cmds:
      - npm run test:e2e:ci

  test:pwa:e2e:
    desc: "Run E2E suites sequentially (one file at a time to avoid cross-suite state)"
    dir: pwa
    cmds:
      - npm run test:e2e:planner
      - npm run test:e2e:planner-full-cycle
      - npm run test:e2e:planner-social
      - npm run test:e2e:utility
      - npm run test:e2e:home

  test:smoke:
    desc: "💨 Docker Smoke Test (Local CI Parity)"
    summary: |
      Builds and starts all services using CI overrides, verifies health, and tears down.
      Matches the 'docker-smoke' job in .github/workflows/ci.yml
    cmds:
      - |
        echo "🚀 Starting Docker Smoke Test..."
        # Use existing COMPOSE_CMD but append ci-overrides.yml
        {{.COMPOSE_CMD}} -f docker/compose/ci-overrides.yml up --build -d
      - |
        echo "⌛ Waiting for services to be healthy..."
        # Wait for Postgres
        for i in $(seq 1 30); do
          STATUS=$(docker inspect --format='{{"{{"}}.State.Health.Status{{"}}"}}' whats-for-supper-postgres 2>/dev/null || echo "")
          if [ "$STATUS" = "healthy" ]; then echo "  ✓ Postgres healthy"; break; fi
          [ "$i" -eq 30 ] && echo "  ✗ Postgres failed health check" && exit 1
          sleep 2
        done
        # Wait for PWA (via Traefik or direct)
        for i in $(seq 1 30); do
          if curl -sf http://localhost:3000/api/health > /dev/null; then echo "  ✓ PWA healthy"; break; fi
          [ "$i" -eq 30 ] && echo "  ✗ PWA failed health check" && exit 1
          sleep 3
        done
        # Verify API
        for i in $(seq 1 20); do
          if curl -sf http://localhost:9001/health > /dev/null; then
            echo "  ✓ API healthy (Port 9001)"
            break
          fi
          [ "$i" -eq 20 ] && echo "  ✗ API failed health check" && exit 1
          sleep 2
        done
      - echo "✅ Smoke test passed!"
      - task: test:smoke:down

  test:smoke:down:
    desc: "Tear down smoke test environment"
    cmds:
      - '{{.COMPOSE_CMD}} -f docker/compose/ci-overrides.yml down -v'
      - echo "✓ Smoke test environment cleaned up"
    silent: true


  # ============================================================================
  # BUILDING
  # ============================================================================

  build:
    desc: "📦 Force rebuild all images (No-cache + Image removal)"
    cmds:
      - task: clean:images
      - task: publish
        vars: { NOCACHE: "true" }

  publish:
    desc: "🚀 Build images (local by default, set PUSH=true to push)"
    cmds:
      - task: publish:migration
        vars: { NOCACHE: "{{.NOCACHE}}" }
      - task: publish:api
        vars: { NOCACHE: "{{.NOCACHE}}" }
      - task: publish:pwa
        vars: { NOCACHE: "{{.NOCACHE}}" }
      - |
        if [ "{{.PUSH}}" == "true" ]; then
          echo "✓ Version {{.TAG}} pushed to {{.WFS_REGISTRY}}"
        else
          echo "✓ Version {{.TAG}} built locally"
        fi

  publish:api:
    desc: "Build API image"
    vars:
      TAG: '{{default .TAG .CLI_ARGS}}'
      PUSH_FLAG: '{{if eq .PUSH "true"}}--push{{else}}--load{{end}}'
      CACHE_FLAGS: '{{if .GITHUB_ACTIONS}}--cache-from type=gha --cache-to type=gha,mode=max{{else}}{{end}}'
      NOCACHE_FLAG: '{{if .NOCACHE}}--no-cache{{end}}'
    cmds:
      - echo "Building API {{.TAG}} (Push={{.PUSH | default "false"}}, NoCache={{.NOCACHE | default "false"}})..."
      - >
        docker buildx build
        {{.NOCACHE_FLAG}}
        --platform {{.PLATFORMS}}
        -t {{.WFS_REGISTRY}}/whats-for-supper-api:{{.TAG}}
        -t {{.WFS_REGISTRY}}/whats-for-supper-api:latest
        ./api
        {{.CACHE_FLAGS}}
        {{.PUSH_FLAG}}
        --target production

  publish:pwa:
    desc: "Build PWA image"
    vars:
      TAG: '{{default .TAG .CLI_ARGS}}'
      PUSH_FLAG: '{{if eq .PUSH "true"}}--push{{else}}--load{{end}}'
      CACHE_FLAGS: '{{if .GITHUB_ACTIONS}}--cache-from type=gha --cache-to type=gha,mode=max{{else}}{{end}}'
      NOCACHE_FLAG: '{{if .NOCACHE}}--no-cache{{end}}'
    cmds:
      - echo "Building PWA {{.TAG}} (Push={{.PUSH | default "false"}}, NoCache={{.NOCACHE | default "false"}})..."
      - >
        docker buildx build
        {{.NOCACHE_FLAG}}
        --platform {{.PLATFORMS}}
        -t {{.WFS_REGISTRY}}/whats-for-supper-pwa:{{.TAG}}
        -t {{.WFS_REGISTRY}}/whats-for-supper-pwa:latest
        ./pwa
        {{.CACHE_FLAGS}}
        {{.PUSH_FLAG}}
        --target production

  publish:migration:
    desc: "Build migration image"
    vars:
      TAG: '{{default .TAG .CLI_ARGS}}'
      PUSH_FLAG: '{{if eq .PUSH "true"}}--push{{else}}--load{{end}}'
      CACHE_FLAGS: '{{if .GITHUB_ACTIONS}}--cache-from type=gha --cache-to type=gha,mode=max{{else}}{{end}}'
      NOCACHE_FLAG: '{{if .NOCACHE}}--no-cache{{end}}'
    cmds:
      - echo "Building migration {{.TAG}} (Push={{.PUSH | default "false"}}, NoCache={{.NOCACHE | default "false"}})..."
      - >
        docker buildx build
        {{.NOCACHE_FLAG}}
        --platform {{.PLATFORMS}}
        -t {{.WFS_REGISTRY}}/whats-for-supper-db-migration:{{.TAG}}
        -t {{.WFS_REGISTRY}}/whats-for-supper-db-migration:latest
        ./api/database
        {{.CACHE_FLAGS}}
        {{.PUSH_FLAG}}

  # ============================================================================
  # PRODUCTION & DEPLOYMENT
  # ============================================================================

  prod:config:
    desc: "Generate production compose (for NAS)"
    cmds:
      - 'docker compose -f docker/compose/infrastructure.yml -f docker/compose/apps.yml -f docker/compose/production-overrides.yml config > docker/docker-compose.prod.yml'
      - echo "✓ Production config generated at docker/docker-compose.prod.yml"

  # ============================================================================
  # RELEASE
  # ============================================================================

  tag:
    desc: "🏷️ Tag and push. Usage: task tag [patch|minor|major] [hints...] or task tag -- v1.2.3"
    cmds:
      - |
        # 1. Fetch all tags from origin
        git fetch --tags --quiet

        # 2. Find the latest semver tag
        LATEST=$(git tag -l 'v*' --sort=-v:refname | head -1)
        if [ -z "$LATEST" ]; then
          LATEST="v0.0.0"
        fi

        # 3. Parse args — first arg is bump type OR explicit version
        ARGS=({{.CLI_ARGS}})
        FIRST=${ARGS[0]:-patch}

        if [[ "$FIRST" == v* ]]; then
          # Explicit override
          VERSION="$FIRST"
          HINT_START=1
        else
          # Auto-bump from latest tag
          BUMP="${FIRST:-patch}"
          HINT_START=1

          # Strip leading 'v', split semver (handles v0.1 and v1.2.3)
          SEMVER="${LATEST#v}"
          IFS='.' read -r MAJOR MINOR PATCH <<< "$SEMVER"
          MAJOR=${MAJOR:-0}
          MINOR=${MINOR:-0}
          PATCH=${PATCH:-0}

          case "$BUMP" in
            major) MAJOR=$((MAJOR+1)); MINOR=0; PATCH=0 ;;
            minor) MINOR=$((MINOR+1)); PATCH=0 ;;
            patch|*) PATCH=$((PATCH+1)) ;;
          esac

          VERSION="v${MAJOR}.${MINOR}.${PATCH}"
        fi

        # 4. Build message with hints
        MSG="Release $VERSION"
        for HINT in "${ARGS[@]:$HINT_START}"; do
          MSG="$MSG [$HINT]"
        done

        # 5. Branch check
        CURRENT_BRANCH=$(git branch --show-current)
        if [ "$CURRENT_BRANCH" != "main" ] && [ "$CURRENT_BRANCH" != "master" ]; then
          echo "❌ Error: Tags must be pushed from the 'main' branch (current: $CURRENT_BRANCH)"
          exit 1
        fi

        echo "Latest tag: $LATEST"
        echo "New tag:    $VERSION"
        echo "Message:    $MSG"
        git tag -a "$VERSION" -m "$MSG"
        git push origin "$VERSION"
        echo "✓ Tag $VERSION created and pushed."


  # ============================================================================
  # CONTAINER MANAGEMENT
  # ============================================================================

  down:
    desc: "⛔ Stop all modular services"
    cmds:
      - '{{.COMPOSE_CMD}} down'
      - echo "✓ Modular services stopped"


  ps:
    desc: "Show running containers"
    cmds:
      - '{{.COMPOSE_CMD}} ps'

  restart:
    desc: "Restart all containers"
    cmds:
      - task: down
      - task: up

  # ============================================================================
  # LOGGING & DEBUGGING
  # ============================================================================

  logs:
    desc: "📋 View logs from all services"
    cmds:
      - '{{.COMPOSE_CMD}} logs -f'

  logs:api:
    desc: "View API logs"
    cmds:
      - '{{.COMPOSE_CMD}} logs -f api'

  logs:pwa:
    desc: "View PWA logs"
    cmds:
      - '{{.COMPOSE_CMD}} logs -f pwa'

  logs:db:
    desc: "View database logs"
    cmds:
      - '{{.COMPOSE_CMD}} logs -f postgres'

  logs:tail:
    desc: "Tail logs from all services (last 50 lines)"
    cmds:
      - '{{.COMPOSE_CMD}} logs --tail=50'

  # ============================================================================
  # DATABASE
  # ============================================================================

  migrate:
    desc: "🗄️  Run database migrations (psqldef)"
    cmds:
      - '{{.COMPOSE_CMD}} run --rm migration'
      - echo "✓ Migrations applied via psqldef"

  db:schema:pull:
    desc: "Update api/database/schema.sql from live database"
    cmds:
      - 'docker exec whats-for-supper-postgres pg_dump -U recipe_app -s {{.DB_NAME}} > api/database/schema.sql'
      - echo "✓ Schema pulled to api/database/schema.sql"

  db:schema:push:
    desc: "Apply api/database/schema.sql to live database (Dry run: set DRY_RUN=true)"
    cmds:
      - |
        DRY_FLAG=""
        if [ "{{.DRY_RUN}}" == "true" ]; then DRY_FLAG="--dry-run"; fi
        docker run --rm -v $(pwd)/api/database/schema.sql:/schema.sql:ro --network wfs-internal -e PGPASSWORD=secure_dev_password sqldef/psqldef:latest -h postgres -U recipe_app {{.DB_NAME}} $DRY_FLAG -f /schema.sql

  seed:
    desc: "Populate database with test data"
    cmds:
      - |
        echo "🚀 Waiting for API to be healthy..."
        for i in $(seq 1 20); do
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" -H "Host: api.wfs.localhost" http://localhost/health)
          if [ "$STATUS" == "200" ]; then
            echo "✅ API is up!"
            break
          fi
          [ "$i" -eq 20 ] && echo "❌ API failed to start (Status: $STATUS)" && exit 1
          printf "."
          sleep 2
        done

        echo "🚀 Triggering database seed..."
        # Retry the trigger itself a few times if proxy is still warm-up
        for i in $(seq 1 5); do
          RESPONSE=$(curl -X POST -s -H "Host: api.wfs.localhost" http://localhost/api/management/seed)
          # Try root first (SkipWrapping), then data (Default)
          TASK_ID=$(echo $RESPONSE | jq -r '.taskId // .data.taskId // empty')
          if [ -n "$TASK_ID" ] && [ "$TASK_ID" != "null" ]; then break; fi
          sleep 1
        done

        if [ -z "$TASK_ID" ] || [ "$TASK_ID" == "null" ]; then
          echo "❌ Failed to enqueue seed task: $RESPONSE"
          exit 1
        fi

        echo "⏳ Seed task enqueued ($TASK_ID). Waiting for completion..."

        # Poll status every 2 seconds
        for i in $(seq 1 30); do
          STATUS_JSON=$(curl -s -H "Host: api.wfs.localhost" http://localhost/api/management/status)
          # Status endpoint is also [SkipWrapping]
          CURRENT_STATUS=$(echo $STATUS_JSON | jq -r '.status // .data.status')
          CURRENT_ID=$(echo $STATUS_JSON | jq -r '.workflowId // .data.workflowId')

          if [ "$CURRENT_ID" == "$TASK_ID" ]; then
            if [ "$CURRENT_STATUS" == "Completed" ]; then
              echo "✅ Seed Completed Successfully!"
              echo $STATUS_JSON | jq '.result // .data.result'
              exit 0
            elif [ "$CURRENT_STATUS" == "Failed" ]; then
              echo "❌ Seed Failed!"
              echo $STATUS_JSON | jq '.result // .data.result'
              exit 1
            fi
          fi

          printf "."
          sleep 2
        done

        echo "⚠️  Timeout waiting for seed task to complete. Check 'task logs:api' for details."

  # ============================================================================
  # RECIPE MANAGEMENT
  # ============================================================================

  recipes:import:all:
    desc: "📥 Bulk-trigger recipe-import for all unimported recipes"
    cmds:
      - |
        if [ "${DEV:-false}" = "true" ] || ! docker ps --format '{{`{{.Names}}`}}' 2>/dev/null | grep -q "whats-for-supper-traefik"; then
          API_BASE="http://localhost:9001"
          api_curl() { curl -s "$@"; }
          echo "🔧 Using dev API at $API_BASE"
        else
          API_BASE="http://localhost"
          api_curl() { curl -s -H "Host: api.wfs.localhost" "$@"; }
        fi
        echo "🚀 Triggering bulk recipe import..."
        HTTP_CODE=$(api_curl -X POST -o /tmp/wfs_import.json -w "%{http_code}" "$API_BASE/api/management/bulk-import")
        RESPONSE=$(cat /tmp/wfs_import.json 2>/dev/null || echo "")
        if [ "$HTTP_CODE" = "000" ]; then
          echo "❌ Connection failed — API is not reachable at $API_BASE"
          echo "   → Check: task logs:api  (or: task up)"
          exit 1
        fi
        QUEUED=$(echo "$RESPONSE" | jq -r '.queuedCount // empty' 2>/dev/null)
        if [ -z "$QUEUED" ]; then
          echo "❌ Failed (HTTP $HTTP_CODE): $RESPONSE"
          exit 1
        fi
        echo "✅ Queued $QUEUED recipe-import workflow(s)."
        echo "$RESPONSE" | jq '.instanceIds'

  recipes:import:
    desc: "📥 Trigger import for recipes. Usage: task recipes:import -- <recipe-id> [<recipe-id>...]"
    cmds:
      - |
        RECIPE_IDS="{{.CLI_ARGS}}"
        if [ -z "$RECIPE_IDS" ]; then
          echo "❌ Error: Recipe ID(s) required."
          echo "Usage: task recipes:import -- <recipe-id> [<recipe-id>...]"
          exit 1
        fi

        # Determine API Base
        if [ "${DEV:-false}" = "true" ] || ! docker ps --format '{{`{{.Names}}`}}' 2>/dev/null | grep -q "whats-for-supper-traefik"; then
          API_BASE="http://localhost:9001"
          api_curl() { curl -s "$@"; }
          echo "🔧 Using dev API at $API_BASE"
        else
          API_BASE="http://localhost"
          api_curl() { curl -s -H "Host: api.wfs.localhost" "$@"; }
        fi

        for RECIPE_ID in $RECIPE_IDS; do
          echo "🚀 Triggering import for recipe $RECIPE_ID..."
          HTTP_CODE=$(api_curl -X POST -o /tmp/wfs_import.json -w "%{http_code}" "$API_BASE/api/recipes/$RECIPE_ID/import")
          RESPONSE=$(cat /tmp/wfs_import.json 2>/dev/null || echo "")

          if [ "$HTTP_CODE" = "000" ]; then
            echo "❌ Connection failed — API is not reachable at $API_BASE"
            exit 1
          fi

          IMPORT_ID=$(echo "$RESPONSE" | jq -r '.importId // empty' 2>/dev/null)
          if [ -z "$IMPORT_ID" ]; then
            echo "❌ Failed for $RECIPE_ID (HTTP $HTTP_CODE): $RESPONSE"
          else
            echo "✅ Import triggered for $RECIPE_ID. Import ID: $IMPORT_ID"
          fi
        done

  recipes:import:status:
    desc: "📊 Get import pipeline summary (imported / queued / failed counts)"
    cmds:
      - |
        if [ "${DEV:-false}" = "true" ] || ! docker ps --format '{{`{{.Names}}`}}' 2>/dev/null | grep -q "whats-for-supper-traefik"; then
          API_BASE="http://localhost:9001"
          api_curl() { curl -s "$@"; }
          echo "🔧 Using dev API at $API_BASE"
        else
          API_BASE="http://localhost"
          api_curl() { curl -s -H "Host: api.wfs.localhost" "$@"; }
        fi
        HTTP_CODE=$(api_curl -o /tmp/wfs_status.json -w "%{http_code}" "$API_BASE/api/recipes/import-status")
        if [ "$HTTP_CODE" = "000" ]; then
          echo "❌ Connection failed — API is not reachable at $API_BASE"
          echo "   → Check: task logs:api  (or: task up)"
          exit 1
        fi
        cat /tmp/wfs_status.json | jq .





  db:backup:
    desc: "Backup database (Local or Remote)"
    vars:
      FILENAME: 'backup_{{now | date "20060102_150405"}}.sql'
    cmds:
      - |
        if [ "{{.TARGET_DB_HOST}}" == "localhost" ] || [ "{{.TARGET_DB_HOST}}" == "postgres" ]; then
          docker exec whats-for-supper-postgres pg_dump -U recipe_app {{.DB_NAME}} > {{.FILENAME}}
        else
          pg_dump -h {{.TARGET_DB_HOST}} -U recipe_app {{.DB_NAME}} > {{.FILENAME}}
        fi
      - echo "✓ Database backed up to {{.FILENAME}}"

  db:restore:
    desc: "Restore database from backup (Usage: task db:restore -- [file])"
    interactive: true
    cmds:
      - |
        FILE="{{.CLI_ARGS}}"
        if [ -z "$FILE" ]; then
          echo "❌ Error: Backup file path required."
          echo "Usage: task db:restore -- ./backup.sql"
          exit 1
        fi
        if [ ! -f "$FILE" ]; then
          echo "❌ Error: File $FILE not found."
          exit 1
        fi

        echo "Restoring $FILE to {{.TARGET_DB_HOST}}..."
        if [ "{{.TARGET_DB_HOST}}" == "localhost" ] || [ "{{.TARGET_DB_HOST}}" == "postgres" ]; then
          docker exec -i whats-for-supper-postgres psql -U recipe_app {{.DB_NAME}} < "$FILE"
        else
          psql -h {{.TARGET_DB_HOST}} -U recipe_app {{.DB_NAME}} < "$FILE"
        fi
        echo "✓ Database restored"

  # ============================================================================
  # CONTAINER SHELLS
  # ============================================================================

  shell:api:
    desc: "Open bash shell in API container"
    cmds:
      - 'docker exec -it whats-for-supper-api bash'

  shell:pwa:
    desc: "Open shell in PWA container"
    cmds:
      - 'docker exec -it whats-for-supper-pwa sh'

  shell:db:
    desc: "Open psql shell in database"
    cmds:
      - 'docker exec -it whats-for-supper-postgres psql -U recipe_app -d {{.DB_NAME}}'

  # ============================================================================
  # CODE QUALITY
  # ============================================================================

  format:
    desc: "✨ Format code (API + PWA)"
    cmds:
      - task: format:api
      - task: format:pwa
      - echo "✓ Code formatted"

  format:api:
    desc: "Format C# code"
    dir: api
    cmds:
      - dotnet format

  format:pwa:
    desc: "Format JavaScript/TypeScript code"
    dir: pwa
    cmds:
      - npm run format

  lint:
    desc: "🔍 Lint code (API + PWA)"
    cmds:
      - task: lint:api
      - task: lint:pwa
      - echo "✓ No lint errors"

  lint:api:
    desc: "Lint C# code"
    dir: api
    cmds:
      - dotnet format --verify-no-changes --verbosity diagnostic

  lint:pwa:
    desc: "Lint JavaScript/TypeScript code"
    dir: pwa
    cmds:
      - npm run lint

  typecheck:
    desc: "Type check TypeScript code"
    dir: pwa
    cmds:
      - npm run typecheck

  # ============================================================================
  # HEALTH & DIAGNOSTICS
  # ============================================================================

  health:
    desc: "🏥 Check service health"
    cmds:
      - |
        echo "Checking services..."
        echo ""
        echo "API (Traefik Route):"
        curl -s -H "Host: api.wfs.localhost" http://localhost/health 2>/dev/null | jq . 2>/dev/null && echo "  ✓ API running" || echo "  ✗ API not responding"
        echo ""
        echo "PWA (Traefik Route):"
        curl -s -H "Host: pwa.wfs.localhost" http://localhost/api/health 2>/dev/null | jq . 2>/dev/null && echo "  ✓ PWA running" || echo "  ✗ PWA not responding"
        echo ""
        echo "Database:"
        docker exec whats-for-supper-postgres pg_isready -U postgres 2>/dev/null && echo "  ✓ Database running" || echo "  ✗ Database not responding"

  env:
    desc: "Show environment configuration"
    cmds:
      - |
        echo "Environment Variables:"
        echo ""
        grep -E "^(POSTGRES|API|REDIS|GEMINI)" docker/.env 2>/dev/null || echo "  No service env vars in docker/.env"
        echo ""
        echo "Service Ports:"
        echo "  API: {{.API_PORT}}"
        echo "  PWA: {{.PWA_PORT}}"
        echo "  DB:  {{.DB_PORT}}"

  # ============================================================================
  # OLLAMA
  # ============================================================================

  ollama:start:
    desc: "🤖 Start Ollama daemon (bound to 0.0.0.0) and preload gemma4:e4b"
    vars:
      OLLAMA_MODEL: '{{.OLLAMA_MODEL | default "gemma4:e4b"}}'
    cmds:
      - |
        if pgrep -x ollama > /dev/null; then
          echo "✓ Ollama already running (Note: if it's not reachable from outside, run 'task ollama:stop' first)"
        else
          echo "🚀 Starting Ollama daemon (0.0.0.0)..."
          OLLAMA_HOST=0.0.0.0 ollama serve &>/tmp/ollama.log &
          # Wait for it to be ready
          for i in $(seq 1 15); do
            if curl -sf http://localhost:11434/ > /dev/null 2>&1; then
              echo "  ✓ Ollama daemon ready"
              break
            fi
            [ "$i" -eq 15 ] && echo "  ✗ Ollama failed to start" && exit 1
            sleep 1
          done
        fi
      - |
        echo "📥 Pulling model {{.OLLAMA_MODEL}} (no-op if already present)..."
        ollama pull {{.OLLAMA_MODEL}}
        echo "🔥 Preloading {{.OLLAMA_MODEL}} into memory..."
        ollama run {{.OLLAMA_MODEL}} "" 2>/dev/null || true
        echo "✅ Ollama ready with model {{.OLLAMA_MODEL}}"

  ollama:stop:
    desc: "🛑 Stop Ollama daemon"
    cmds:
      - |
        if pgrep -x ollama > /dev/null; then
          pkill -x ollama
          echo "✓ Ollama daemon stopped"
        else
          echo "✓ Ollama is not running"
        fi

  ollama:status:
    desc: "📊 Show Ollama daemon status and loaded models"
    cmds:
      - |
        echo "Ollama Daemon:"
        if pgrep -x ollama > /dev/null; then
          echo "  ✓ Running (PID: $(pgrep -x ollama))"
        else
          echo "  ✗ Not running"
          exit 0
        fi
        echo ""
        echo "Available Models:"
        ollama list 2>/dev/null || echo "  (none)"
        echo ""
        echo "Running Models:"
        ollama ps 2>/dev/null || echo "  (none loaded)"

  # ============================================================================
  # CLEANUP
  # ============================================================================

  clean:
    desc: "🧹 Clean up build artifacts and docker state (keeps node_modules)"
    cmds:
      - '{{.COMPOSE_CMD}} down -v'
      - rm -rf api/bin api/obj
      - rm -rf pwa/.next
      - echo "✓ Cleaned up (node_modules preserved)"
    interactive: true

  clean:all:
    desc: "🧹 Deep clean including node_modules"
    cmds:
      - task: clean
      - rm -rf pwa/node_modules
      - echo "✓ Deep clean complete"
    interactive: true


  clean:images:
    desc: "🧹 Remove all project images"
    cmds:
      - |
        echo "Removing project images..."
        IMAGES=$(docker images --format '{{`{{.Repository}}:{{.Tag}}`}}' | grep -E "(whats-for-supper|{{.WFS_REGISTRY}}/whats-for-supper)" || true)
        if [ -n "$IMAGES" ]; then
          docker rmi -f $IMAGES || true
          echo "✓ Project images removed"
        else
          echo "✓ No project images found"
        fi

  # ============================================================================
  # SETUP & INITIALIZATION
  # ============================================================================

  init:
    desc: "Initialize project (first-time setup)"
    cmds:
      - |
        echo "Setting up What's For Supper..."
        echo ""
      - task: init:tools
      - task: init:env
      - task: init:dependencies
      - task: up
      - task: migrate
      - task: seed
      - task: hooks:install
      - |
        echo ""
        echo "✓ Project initialized!"
        echo ""
        echo "Next steps:"
        echo "  1. Open http://localhost:{{.PWA_PORT}} in your browser"
        echo "  2. Run: task logs (to watch all services)"
        echo "  3. Edit code and see changes instantly"
        echo "  4. Run: task test (before committing)"

  init:env:
    desc: "Create .env.local from template"
    cmds:
      - |
        if [ ! -f docker/.env ]; then
          cp docker/.env.example docker/.env
          echo "✓ Created docker/.env"
        else
          echo "✓ docker/.env already exists"
        fi
    status:
      - test -f docker/.env

  init:dependencies:
    desc: "Install all dependencies"
    cmds:
      - |
        echo "Installing API dependencies..."
        cd api && dotnet restore
        echo "✓ API dependencies installed"
        echo ""
        echo "Installing PWA dependencies..."
        cd ../pwa && npm install
        echo "✓ PWA dependencies installed"

  init:tools:
    desc: "Install required development tools (pre-commit, etc.)"
    cmds:
      - |
        if ! command -v pre-commit &> /dev/null; then
          echo "Installing pre-commit..."
          if command -v brew &> /dev/null; then
            brew install pre-commit
          else
            pip3 install pre-commit || echo "⚠️ Failed to install pre-commit. Please install it manually: https://pre-commit.com/#install"
          fi
        else
          echo "✓ pre-commit already installed"
        fi

  # ============================================================================
  # GIT HOOKS (optional)
  # ============================================================================

  hooks:install:
    desc: "Install git pre-commit hook"
    cmds:
      - pre-commit install
      - echo "✓ Pre-commit hooks installed via pre-commit framework"

  # ============================================================================
  # DOCUMENTATION
  # ============================================================================

  docs:dev-loop:
    desc: "Open local development loop documentation"
    cmds:
      - |
        if command -v open &> /dev/null; then
          open LOCAL_DEV_LOOP.md
        elif command -v xdg-open &> /dev/null; then
          xdg-open LOCAL_DEV_LOOP.md
        else
          cat LOCAL_DEV_LOOP.md
        fi

  docs:spec:
    desc: "Open Phase 0 specification"
    cmds:
      - |
        if command -v open &> /dev/null; then
          open specs/phase0-mvp.spec.md
        elif command -v xdg-open &> /dev/null; then
          xdg-open specs/phase0-mvp.spec.md
        else
          cat specs/phase0-mvp.spec.md
        fi


  review:
    desc: "Pre-commit review: format + lint + test"
    cmds:
      - task: format
      - task: lint
      - task: typecheck
      - task: test
      - echo ""
      - echo "✓ Ready to commit!"

  ship:
    desc: "Ship checklist: review + clean build + test"
    cmds:
      - task: review
      - task: build
      - task: up
      - task: health
      - echo ""
      - echo "✓ Everything looks good! Ready to push."

  # ============================================================================
  # API & CONTRACTS
  # ============================================================================

  types:sync:
    desc: "🔄 Sync TypeScript types from OpenAPI spec"
    dir: pwa
    cmds:
      - npx openapi-typescript ../specs/openapi.yaml -o src/lib/api/types.ts
      - echo "✓ TypeScript types updated in pwa/src/lib/api/types.ts"

  agent:reconcile:
    desc: "🤖 Reconcile Spec vs Mock vs Real API"
    cmds:
      - python3 scripts/agent/api_tools.py

  # ============================================================================
  # AGENT TOOLS (AI OPTIMIZED)
  # ============================================================================

  agent:summary:
    desc: "🤖 Context-dense project summary for AI agents"
    cmds:
      - |
        echo "=== PROJECT SUMMARY ==="
        echo "Tech Stack: .NET 10, Next.js, Postgres (pgvector)"
        echo ""
        echo "Directory Tree (Depth 2):"
        find . -maxdepth 2 -not -path '*/.*'
        echo ""
        echo "Agent Skills Library:"
        ls .agents/*.md
        echo ""
        echo "Service Health:"
        task health
        echo ""
        echo "Active Session:"
        cat HANDOVER.md 2>/dev/null || echo "No active handover log found."

  agent:api:
    desc: "🤖 Map all API endpoints (Low token discovery)"
    cmds:
      - python3 scripts/agent/api_tools.py --discovery

  agent:status:
    desc: "🤖 Read the handover journal"
    cmds:
      - cat HANDOVER.md

  agent:list:
    desc: "🤖 List all agent-specific tasks"
    cmds:
      - task -l | grep "agent:"
    silent: true

  agent:slice:
    desc: "🤖 Vertical Slice Viewer (Contract ↔ Backend ↔ Client). Usage: task agent:slice -- /api/route"
    cmds:
      - python3 scripts/agent/slice.py {{.CLI_ARGS}}

  agent:drift:
    desc: "🤖 Schema Drift — Tier 0 (endpoint diff, needs API running) + Tier 1 (DTO schema comparison)"
    cmds:
      - python3 scripts/agent/drift.py

  agent:drift:endpoints:
    desc: "🤖 Schema Drift — Tier 0 only: diff generated API endpoints vs specs/openapi.yaml (needs API running)"
    cmds:
      - python3 scripts/agent/drift.py --endpoint-diff

  agent:drift:schemas:
    desc: "🤖 Schema Drift — Tier 1 only: compare spec schemas vs C# DTOs (no API needed)"
    cmds:
      - python3 scripts/agent/drift.py --schema-only

  agent:audit:
    desc: "🤖 Brittle Selector Audit (Check tests for missing data-testid)"
    cmds:
      - python3 scripts/agent/test_ops.py --audit

  agent:test:impact:
    desc: "🤖 Impact-Aware Test Runner (Only run tests affected by git changes)"
    cmds:
      - python3 scripts/agent/test_ops.py --impact
  # ============================================================================
  # AUTH
  # ============================================================================
  auth:token:
    desc: "Generate a valid h_access token for a given secret (Usage: task auth:token -- [secret])"
    cmds:
      - node scripts/generate-auth-token.mjs "{{.CLI_ARGS}}" token

  auth:cookie:
    desc: "Generate a document.cookie string for browser injection (Usage: task auth:cookie -- [secret])"
    cmds:
      - node scripts/generate-auth-token.mjs "{{.CLI_ARGS}}" cookie
